<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>

    <title>Workout Timer</title>

    <link rel='icon' type='image/png' href='assets/images/favicon.png'>
    <link rel='stylesheet' href='assets/css/styles.css'>
    <!-- <script src='assets/js/scripts.js'></script> -->
</head>
<body>

    <div class='content-body'>
        <h1 class='title'>Workout Timer</h1>

        <div class='clock'>
            <div class='readout-container'>
                <span class='readout'>0</span>
                <span class='readout separator'>:</span>
                <span class='readout'>00</span>
            </div>

            <div class='round-count-container'>
                <span class='round-count'>Round</span>
                <span class='round-count'>0</span>
                <span class='round-count'>/</span>
                <span class='round-count'>0</span>
            </div>

            <div class='clock-controls'>
                <button>Pause</button>
                <button>Cancel</button>
            </div>
        </div>

        <div class='controls'>
            <div class='control-types'>
                <span class='active'>EMOM</span>
                <span>AMRAP</span>
            </div>

            <div class='control-panel'>
                <div class='control-item'>
                    <div class='label'>
                        <span>E</span>
                        <span>1</span>
                        <span>MOM</span>
                    </div>

                    <div class='increment-buttons'>
                        <button>&#9666&#9666&#9666</button>
                        <button>&#9666&#9666</button>
                        <button>&#9666</button>
                        <button>&#9656</button>
                        <button>&#9656&#9656</button>
                        <button>&#9656&#9656&#9656</button>
                    </div>
                </div>

                <div class='control-item'>
                    <div class='label'>
                        <span>x</span>
                        <span>10</span>
                    </div>

                    <div class='increment-buttons'>
                        <button>&#9666&#9666&#9666</button>
                        <button>&#9666&#9666</button>
                        <button>&#9666</button>
                        <button>&#9656</button>
                        <button>&#9656&#9656</button>
                        <button>&#9656&#9656&#9656</button>
                    </div>
                </div>

                <div class='control-buttons'>
                    <button>Start</button>
                    <button>Reset</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
