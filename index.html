<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>

    <title>Workout Timer</title>

    <link rel='icon' type='image/png' href='assets/images/favicon.png'>
    <link rel='stylesheet' href='assets/css/styles.css'>
    <script src='assets/js/scripts.js'></script>
</head>
<body>

    <div class='content-body'>
        <h1 class='title'>Workout Timer</h1>

        <div class='clock'>
            <div class='readout-container'>
                <span class='readout'>0</span>
                <span class='readout separator'>:</span>
                <span class='readout'>00</span>
            </div>

            <div class='round-count-container'>
                <span class='round-count'>Round</span>
                <span class='round-count'>0</span>
                <span class='round-count'>/</span>
                <span class='round-count'>0</span>
            </div>

            <div class='clock-controls'>
                <button>Pause</button>
                <button>Cancel</button>
            </div>
        </div>

        <div class='controls'>
            <div class='control-types'>
                <button class='active' onclick="switchType(this, 'emom')">EMOM</button>
                <button onclick="switchType(this, 'amrap')">AMRAP</button>
            </div>

            <div class='control-panel-container'>
                <div id='emomControlPanel' class='control-panel'>
                    <div class='control-item'>
                        <div class='label'>
                            <span>E</span>
                            <span id='emomMinutes'></span>
                            <span>MOM</span>
                        </div>

                        <div class='adjustment-buttons'>
                            <button onclick="adjustSetting('emomMinutes', -1)">&#9666&#9666&#9666</button>
                            <button onclick="adjustSetting('emomMinutes', -0.5)">&#9666&#9666</button>
                            <button onclick="adjustSetting('emomMinutes', -0.25)">&#9666</button>
                            <button onclick="adjustSetting('emomMinutes', 0.25)">&#9656</button>
                            <button onclick="adjustSetting('emomMinutes', 0.5)">&#9656&#9656</button>
                            <button onclick="adjustSetting('emomMinutes', 1)">&#9656&#9656&#9656</button>
                        </div>
                    </div>

                    <div class='control-item'>
                        <div class='label'>
                            <span>x</span>
                            <span id='emomRounds'></span>
                        </div>

                        <div class='adjustment-buttons'>
                            <button onclick="adjustSetting('emomRounds', -10)">&#9666&#9666&#9666</button>
                            <button onclick="adjustSetting('emomRounds', -5)">&#9666&#9666</button>
                            <button onclick="adjustSetting('emomRounds', -1)">&#9666</button>
                            <button onclick="adjustSetting('emomRounds', 1)">&#9656</button>
                            <button onclick="adjustSetting('emomRounds', 5)">&#9656&#9656</button>
                            <button onclick="adjustSetting('emomRounds', 10)">&#9656&#9656&#9656</button>
                        </div>
                    </div>

                    <div class='control-buttons'>
                        <button>Start</button>
                        <button onclick="setDefaultValues('emom')">Reset</button>
                    </div>
                </div>

                <div id='amrapControlPanel' class='control-panel hidden'>
                    <div class='control-item'>
                        <div class='label'>
                            <span id='amrapMinutes'></span>
                            <span>Mins</span>
                        </div>

                        <div class='adjustment-buttons'>
                            <button onclick="adjustSetting('amrapMinutes', -10)">&#9666&#9666&#9666</button>
                            <button onclick="adjustSetting('amrapMinutes', -5)">&#9666&#9666</button>
                            <button onclick="adjustSetting('amrapMinutes', -1)">&#9666</button>
                            <button onclick="adjustSetting('amrapMinutes', 1)">&#9656</button>
                            <button onclick="adjustSetting('amrapMinutes', 5)">&#9656&#9656</button>
                            <button onclick="adjustSetting('amrapMinutes', 10)">&#9656&#9656&#9656</button>
                        </div>
                    </div>

                    <div class='control-buttons'>
                        <button>Start</button>
                        <button onclick="setDefaultValues('amrap')">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
